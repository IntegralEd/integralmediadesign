[build]
  command = "npm run build"
  publish = "dist"

# Redirect www subdomain to apex domain
[[redirects]]
  from = "https://www.integralmediadesign.com/*"
  to = "https://integralmediadesign.com/:splat"
  status = 301
  force = true

# Custom 404 page (optional)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
